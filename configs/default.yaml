model:
  vocab_size: 50257
  hidden_size: 768
  num_layers: 12
  num_heads: 12
  intermediate_size: 3072
  max_position_embeddings: 1024
  dropout: 0.1

training:
  batch_size: 8
  learning_rate: 5e-5
  num_epochs: 10
  warmup_steps: 500
  weight_decay: 0.01

data:
  train_path: "data/train.txt"
  val_path: "data/val.txt"
  test_path: "data/test.txt"
  max_seq_length: 512
